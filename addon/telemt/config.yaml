name: "Telemt MTProxy"
version: "3.3.39"
slug: "telemt"
description: "Fast MTProto proxy server (MTProxy) written in Rust"
arch:
  - amd64
  - aarch64
startup: "application"
boot: "auto"
init: false
user: root
host_network: false
host_dbus: false
cap_drop:
  - ALL
cap_add:
  - NET_BIND_SERVICE
read_only: true
security_opt:
  - no-new-privileges:true
map:
  - config:rw
  - ssl:rw
tmpfs:
  - /etc
  - /run/telemt:rw,mode=1777,size=1m
ports:
  "443/tcp": 4443
  "9090/tcp": 9090
  "9091/tcp": 9091
ports_description:
  "443/tcp": "MTProxy listener"
  "9090/tcp": "Metrics endpoint"
  "9091/tcp": "API endpoint"
options:
  secret: ""
  port: 443
  enable_metrics: true
  enable_api: true
  log_level: "info"
  network_mode: "bridge"
schema:
  secret: "str"
  port: "int"
  enable_metrics: "bool"
  enable_api: "bool"
  log_level: "list(info|debug|warn|error|trace)"
  network_mode: "list(host|bridge)"
image: "ghcr.io/telemt/telemt"
logo: "logo.png"
icon: "icon.png"